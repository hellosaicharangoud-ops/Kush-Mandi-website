kind = "web"
previewPath = "/"
title = "Kush Mandi Restaurant"
version = "1.0.0"
id = "artifacts/kush-mandi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18518

[services.development]
run = "pnpm --filter @workspace/kush-mandi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kush-mandi", "run", "build" ]
publicDir = "artifacts/kush-mandi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18518"
BASE_PATH = "/"
