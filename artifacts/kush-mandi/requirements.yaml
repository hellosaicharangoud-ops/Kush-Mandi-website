packages:
  "framer-motion": "For premium cinematic scroll animations, staggered reveals, and interactive hover states"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "react-hook-form": "For form state management in the reservation modal"
