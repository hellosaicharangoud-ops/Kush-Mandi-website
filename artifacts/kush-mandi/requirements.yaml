images: []

notes:
  - "The app functions as a static frontend marketing site. All data is hardcoded as per instructions."
  - "The 'Reservation' mutation is mocked to simulate network latency and show a success toast."
  - "Following the specific request, no external images (like Unsplash) are used. Instead, a stunning custom <GradientArt /> component is built to simulate abstract, premium food photography using CSS grain, radial gradients, and Framer Motion."
